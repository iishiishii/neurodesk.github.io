dirs:
  - content/en/
ignorePatterns:
  - pattern: '^https://twitter.com'
  - pattern: '^http://localhost'
  - pattern: '^https://www.biorxiv.org/content/'
  - pattern: '^https://www\.humanbrainmapping\.org/i4a/pages/index\.cfm\?pageid=3912$'
useGitIgnore: true
aliveStatusCodes:
  - 200
  - 201
  - 204
  - 403
replacementPatterns:
  - pattern: "^/"
    replacement: "https://neurodesk.org/"
