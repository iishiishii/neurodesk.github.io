name: on-opening-issue

on:
  issues:
    types: [opened, reopened]

permissions:
  contents: read

jobs:
  add-issue-to-project:
    uses: neurodesk/neurodesk.github.io/.github/workflows/add-issue-to-project.yml@main
    secrets:
      PAT: ${{ secrets.NEURODESK_GITHUB_TOKEN_ISSUE_AUTOMATION }}
    