name: github pages

on:
  push:
    branches: ["main"]
  repository_dispatch:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: "pages"
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      HUGO_VERSION: 0.161.1
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O "${{ runner.temp }}/hugo.deb" "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb" \
          && sudo dpkg -i "${{ runner.temp }}/hugo.deb"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: | 
          npm install

      - name: Write applist.json
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
          FAIL_ON_APPLIST_ERROR: ${{ vars.FAIL_ON_APPLIST_ERROR }}
        run: |
          if [ -n "$ZENODO_TOKEN" ]; then
            EXTRA_ARGS=()
            case "${FAIL_ON_APPLIST_ERROR,,}" in
              true|1|yes)
                echo "FAIL_ON_APPLIST_ERROR is enabled; running in strict mode."
                EXTRA_ARGS+=(--fail-on-error)
                ;;
              *)
                echo "FAIL_ON_APPLIST_ERROR is not enabled; running in best-effort mode."
                ;;
            esac
            python .github/workflows/write-app-json.py --zenodo_token "$ZENODO_TOKEN" "${EXTRA_ARGS[@]}"
          else
            echo "ZENODO_TOKEN not set — skipping write-app-json.py"
          fi

      - name: Write webapp usage statistics
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN_WEBAPPS_ANALYTICS: ${{ secrets.CLOUDFLARE_API_TOKEN_WEBAPPS_ANALYTICS }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN_WEBAPPS_ANALYTICS" ]; then
            python .github/workflows/write-webapp-usage.py
          elif [[ "${{ github.repository }}" == "neurodesk/neurodesk.github.io" ]]; then
            echo "CLOUDFLARE_API_TOKEN_WEBAPPS_ANALYTICS is required for the upstream docs build"
            exit 1
          else
            echo "CLOUDFLARE_API_TOKEN_WEBAPPS_ANALYTICS not set — writing unavailable placeholder for fork build"
            python .github/workflows/write-webapp-usage.py --allow-missing-token
          fi

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          if [[ "${{ github.repository }}" == "neurodesk/neurodesk.github.io" ]]; then
            echo "Building for staging domain: https://neurodesk.github.io/"
            hugo \
              --minify \
              --baseURL "https://neurodesk.github.io/"
          else
            # Construct the base URL for forks
            BASE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
            echo "Building for fork/preview domain: ${BASE_URL}"
            hugo \
              --minify \
              --baseURL "${BASE_URL}"
          fi

      - name: Verify assets in public
        run: |
          set -e
          MISSING=0
          
          # Determine if we're on a fork (paths will be patched)
          if [[ "${{ github.repository }}" != "neurodesk/neurodesk.github.io" ]]; then
            REPO_PATH="${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
            echo "Fork detected: will strip /${REPO_PATH}/ prefix when checking files"
          fi
          
          # Find referenced /static/ paths in generated HTML/CSS/JS and ensure files exist
          # Use while-read loop to handle filenames with spaces properly
          while IFS= read -r p; do
            # For forks, strip the repo path prefix to get the actual file location
            if [[ "${{ github.repository }}" != "neurodesk/neurodesk.github.io" ]]; then
              # Transform /<owner>.github.io/<repo>/static/... → /static/...
              FILE_PATH="${p#/"${REPO_PATH}"}"
              echo "DEBUG: Checking $p → ${FILE_PATH}"
            else
              FILE_PATH="${p}"
            fi
            
            FILE="public${FILE_PATH}"
            if [ ! -f "$FILE" ]; then
              echo "Missing asset: $p -> expected $FILE"
              MISSING=1
            fi
          done < <(grep -Rho 'src="\/[^"]*static\/[^"]*"' public/ | sed -E 's/.*src="(\/[^"]*)".*/\1/' | sort -u)
          
          if [ "$MISSING" -eq 1 ]; then
            echo "One or more assets missing from public/ — failing the job"
            exit 1
          fi

      
      # Note: Do NOT copy the production CNAME during staging deploys.

      - name: Merge PR previews into artifact (preserve pr-* directories)
        run: |
          set -e
          # Check if gh-pages branch exists
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            echo "Found gh-pages branch, merging preview directories..."
            
            # Fetch gh-pages branch
            git fetch origin gh-pages:refs/remotes/origin/gh-pages
            
            # Create temporary worktree for gh-pages
            mkdir -p /tmp/gh-pages-checkout
            git worktree add /tmp/gh-pages-checkout origin/gh-pages
            
            # Copy any pr-* directories into public/ (preserving previews)
            if ls /tmp/gh-pages-checkout/pr-* 1> /dev/null 2>&1; then
              echo "Copying preview directories to public/..."
              cp -r /tmp/gh-pages-checkout/pr-* public/ || true
              echo "Previews merged successfully"
            else
              echo "No preview directories found (no active PRs)"
            fi
            
            # Clean up worktree
            git worktree remove /tmp/gh-pages-checkout
          else
            echo "No gh-pages branch exists yet, skipping preview merge"
          fi
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  check-links:
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js for Linkspector
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Set up reviewdog
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: v0.21.0

      - name: Run Linkspector with reviewdog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          echo '::group::Installing linkspector'
          npm install -g @umbrelladocs/linkspector@0.5.2
          linkspector --version
          echo '::endgroup::'

          echo '::group::Setting up Chrome Linux sandbox'
          if [ "$(lsb_release -rs)" = "24.04" ]; then
            echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns
          fi
          echo '::endgroup::'

          echo '::group::Running linkspector with reviewdog'
          set +e
          linkspector check -c .linkspector.yml -j |
            reviewdog -f=rdjson \
              -name="Linkspector" \
              -reporter="github-pr-check" \
              -filter-mode="nofilter" \
              -fail-level="any" \
              -level="error"
          linkspector_status=$?
          set -e
          echo '::endgroup::'

          echo '::group::Running linkspector stats'
          linkspector check -c .linkspector.yml -s || true
          echo '::endgroup::'

          exit "$linkspector_status"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    needs: [build]
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

