name: PR Preview Build

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: preview-build-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      HUGO_VERSION: 0.161.1
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O "${{ runner.temp }}/hugo.deb" "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb" \
          && sudo dpkg -i "${{ runner.temp }}/hugo.deb"

      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          submodules: recursive

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Set up Node.js for Hugo
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-auth

      - name: Install Node dependencies
        run: npm install

      - name: Write applist.json
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          if [ -n "$ZENODO_TOKEN" ]; then
            python .github/workflows/write-app-json.py --zenodo_token "$ZENODO_TOKEN"
          else
            echo "ZENODO_TOKEN not set, skipping applist generation"
          fi

      - name: Write user metrics
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GA4_SERVICE_ACCOUNT_KEY: ${{ secrets.GA4_SERVICE_ACCOUNT_KEY }}
        run: |
          if [ -n "$GA4_SERVICE_ACCOUNT_KEY" ]; then
            python .github/workflows/write-user-metrics.py
          else
            echo "GA4_SERVICE_ACCOUNT_KEY not set — writing unavailable placeholder for PR preview"
            python .github/workflows/write-user-metrics.py --allow-missing-token
          fi

      - name: Build preview
        env:
          HUGO_ENVIRONMENT: preview
          HUGO_ENV: preview
        run: |
          PREVIEW_PATH="pr-${{ github.event.pull_request.number }}"
          
          # Use the target repo's Pages domain for previews (staging or fork)
          if [[ "${{ github.event.pull_request.base.repo.full_name }}" == "neurodesk/neurodesk.github.io" ]]; then
            BASE_URL="https://neurodesk.github.io/${PREVIEW_PATH}/"
            echo "Building PR preview for staging: ${BASE_URL}"
          else
            # For PRs to forks (rare case)
            BASE_URL="https://${{ github.event.pull_request.base.repo.owner.login }}.github.io/${{ github.event.pull_request.base.repo.name }}/${PREVIEW_PATH}/"
            echo "Building PR preview for fork: ${BASE_URL}"
          fi
          
          hugo --minify --baseURL "${BASE_URL}"
          
          mkdir -p preview-deploy/${PREVIEW_PATH}
          cp -r public/* preview-deploy/${PREVIEW_PATH}/
          
          # Remove CNAME file from preview - it breaks subdirectory deployment on custom domains
          rm -f preview-deploy/${PREVIEW_PATH}/CNAME
          rm -f preview-deploy/${PREVIEW_PATH}/static/CNAME

      - name: Save PR metadata
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REPO: ${{ github.event.pull_request.base.repo.full_name }}
          BASE_OWNER: ${{ github.event.pull_request.base.repo.owner.login }}
          BASE_NAME: ${{ github.event.pull_request.base.repo.name }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          mkdir -p pr-metadata
          printf '%s\n' "$PR_NUMBER" > pr-metadata/pr-number.txt
          printf '%s\n' "$BASE_REPO" > pr-metadata/base-repo.txt
          printf '%s\n' "$BASE_OWNER" > pr-metadata/base-owner.txt
          printf '%s\n' "$BASE_NAME" > pr-metadata/base-name.txt
          printf '%s\n' "$HEAD_SHA" > pr-metadata/head-sha.txt
          printf '%s\n' "$HEAD_REF" > pr-metadata/head-ref.txt

      - name: Upload preview artifact
        uses: actions/upload-artifact@v7
        with:
          name: pr-preview-${{ github.event.pull_request.number }}
          path: |
            preview-deploy/
            pr-metadata/
          retention-days: 7
          if-no-files-found: error
